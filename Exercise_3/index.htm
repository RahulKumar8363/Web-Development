<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        body {
            background-color: gray;
        }

        .card {
            background-color: white;
            width: 198px;
            height: 360px;
            border-radius: 7px;
        }

        .image {
            padding: 5px;
        }

        .image img {
            border-radius: 7px;
        }
        .content {
            font-size: 13px;
        }
        .capsules{
            padding: 0 34px;
        }
        .capsules span{
            border: 1px solid gray;
            padding: 1px 7px;
            border-radius: 7px;
            font-size: 12px;

        }
    </style>
</head>

<body>
    <div class="card">

        <div class="image">
            <img width="188" src="WhatsApp Image 2026-06-30 at 9.35.59 PM.jpeg" alt="">
        </div>

        <div class="capsules">
        <span>Nature</span>
        <span>Photo</span>
        </div>  

        <div class="content">
            <h1>Rahul</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Possimus quidem dolorem officia fuga quod,
                reiciendis porro necessitatibus? Asperiores architecto consectetur nobis atque delectus!</p>
        </div>

    </div>
</body>

</html>
